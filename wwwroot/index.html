<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Xref Generator</title>
    <base href="/" />
    <link rel="stylesheet" href="lib/bootstrap/dist/css/bootstrap.min.css" />
    <link rel="stylesheet" href="css/app.css" />
    <link rel="icon" type="image/png" href="favicon.png" />
    <link href="BlazorApp.styles.css" rel="stylesheet" />
</head>

<body>
    <div id="app">
        <svg class="loading-progress">
            <circle r="40%" cx="50%" cy="50%" />
            <circle r="40%" cx="50%" cy="50%" />
        </svg>
        <div class="loading-progress-text"></div>
    </div>

    <div id="blazor-error-ui">
        An unhandled error has occurred.
        <a href="." class="reload">Reload</a>
        <span class="dismiss">🗙</span>
    </div>

    <script src="_framework/blazor.webassembly.js" nomodule></script>
    <script type="module">
        import { getAssemblyExports } from './_framework/blazor.web.js';
        
        // Configure Blazor to ignore SRI checks for GitHub Pages
        window.Blazor = window.Blazor || {};
    </script>
    <script>
        // Handle SRI integrity check failures gracefully
        window.addEventListener('error', function(e) {
            if (e.message && e.message.includes('integrity')) {
                e.preventDefault();
            }
        }, true);
        
        // Patch fetch to handle SRI errors
        const originalFetch = window.fetch;
        window.fetch = function(...args) {
            return originalFetch.apply(this, args).catch(err => {
                if (err.message && err.message.includes('integrity')) {
                    // Retry without integrity check
                    const url = args[0];
                    const options = args[1] || {};
                    delete options.integrity;
                    return originalFetch(url, options);
                }
                throw err;
            });
        };
    </script>
    <script>
        function copyToClipboard(e) {
            var copyText = document.getElementById(e);
            copyText.select();
            navigator.clipboard.writeText(copyText.value);
        }
    </script>
</body>

</html>
